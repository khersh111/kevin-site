    if (slug && articleMeta[slug]) {
        const meta = articleMeta[slug];
        document.getElementById('article-title').textContent = meta.title;
        document.getElementById('article-category').textContent = meta.category;
        if (meta.date) {
            document.getElementById('article-date').textContent = meta.date;
        } else {
            document.getElementById('article-date').style.display = 'none';
        }
        document.title = `${meta.title} — Kevin Hershberger`;

        // Show hero image if available
        if (meta.hero) {
            const heroContainer = document.getElementById('article-hero');
            const heroImg = document.getElementById('article-hero-img');
            heroImg.src = meta.hero;
            heroImg.alt = meta.title;
            heroContainer.style.display = 'block';
        }
        document.querySelector('meta[name="description"]').content = `${meta.title} — an article by Dr. Kevin Hershberger.`;

        if (allContent[slug]) {
            // Render native content
            document.getElementById('article-body').innerHTML = allContent[slug];
        } else {
            // Fallback: link to original site 
            document.getElementById('article-body').innerHTML = `
