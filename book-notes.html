<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Notes — Kevin Hershberger</title>
    <meta name="description" content="Curated notes and key takeaways from the best books on health, habits, philosophy, psychology, and personal growth — by Dr. Kevin Hershberger.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <section class="page-hero">
        <div class="page-hero-inner">
            <span class="page-hero-label anim-in">04 — Library</span>
            <h1 class="page-hero-title anim-in">Book <em>notes.</em></h1>
            <p class="page-hero-desc anim-in">Key takeaways and highlights from the books that have shaped my thinking.</p>
        </div>
    </section>

    <section class="listing-page">
        <div class="book-grid" id="book-grid">
            <!-- Books injected by JS -->
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="shared.js"></script>
    <script>
    const books = [
        { slug: "stillness-is-the-key", title: "Stillness Is The Key", author: "Ryan Holiday" },
        { slug: "atomic-habits", title: "Atomic Habits", author: "James Clear" },
        { slug: "deep-work", title: "Deep Work", author: "Cal Newport" },
        { slug: "factfulness", title: "Factfulness", author: "Hans Rosling" },
        { slug: "digital-minimalism", title: "Digital Minimalism", author: "Cal Newport" },
        { slug: "lifespan", title: "Lifespan", author: "David A. Sinclair" },
        { slug: "essentialism", title: "Essentialism", author: "Greg McKeown" },
        { slug: "ego-is-the-enemy", title: "Ego is the Enemy", author: "Ryan Holiday" },
        { slug: "die-with-zero", title: "Die With Zero", author: "Bill Perkins" },
        { slug: "courage-is-calling", title: "Courage Is Calling", author: "Ryan Holiday" },
        { slug: "outlive", title: "Outlive", author: "Peter Attia" },
        { slug: "why-we-sleep", title: "Why We Sleep", author: "Matthew Walker" },
        { slug: "never-split-the-difference", title: "Never Split The Difference", author: "Chris Voss" },
        { slug: "the-subtle-art-of-not-giving-a-fck", title: "The Subtle Art of Not Giving a F*ck", author: "Mark Manson" },
        { slug: "the-obstacle-is-the-way", title: "The Obstacle is the Way", author: "Ryan Holiday" },
        { slug: "stumbling-on-happiness", title: "Stumbling on Happiness", author: "Daniel Gilbert" },
        { slug: "how-to-win-friends-influence-people", title: "How to Win Friends & Influence People", author: "Dale Carnegie" },
        { slug: "a-short-history-of-nearly-everything", title: "A Short History of Nearly Everything", author: "Bill Bryson" },
        { slug: "a-guide-to-the-good-life", title: "A Guide to the Good Life", author: "William B. Irvine" },
        { slug: "show-your-work", title: "Show Your Work", author: "Austin Kleon" },
        { slug: "steal-like-an-artist", title: "Steal Like an Artist", author: "Austin Kleon" },
        { slug: "benjamin-franklin", title: "Benjamin Franklin: An American Life", author: "Walter Isaacson" },
        { slug: "the-48-laws-of-power", title: "The 48 Laws of Power", author: "Robert Greene" },
        { slug: "einstein", title: "Einstein: His Life and Universe", author: "Walter Isaacson" },
        { slug: "four-thousand-weeks", title: "Four Thousand Weeks", author: "Oliver Burkeman" },
        { slug: "the-psychology-of-money", title: "The Psychology of Money", author: "Morgan Housel" },
        { slug: "the-4-hour-workweek", title: "The 4-Hour Workweek", author: "Tim Ferriss" },
        { slug: "so-good-they-cant-ignore-you", title: "So Good They Can't Ignore You", author: "Cal Newport" },
        { slug: "mastery", title: "Mastery", author: "Robert Greene" },
        { slug: "the-comfort-crisis", title: "The Comfort Crisis", author: "Michael Easter" },
        { slug: "the-story-of-the-human-body", title: "The Story of the Human Body", author: "Daniel E. Lieberman" },
        { slug: "feel-good-productivity", title: "Feel Good Productivity", author: "Ali Abdaal" },
        { slug: "exercised", title: "Exercised", author: "Daniel E. Lieberman" }
    ];

    const grid = document.getElementById('book-grid');
    grid.innerHTML = books.map((b, i) => `
        <a href="book-note.html?slug=${b.slug}" class="book-card anim-in" style="animation-delay: ${i * 0.03}s">
            <span class="book-card-num">${String(i + 1).padStart(2, '0')}</span>
            <h3 class="book-card-title">${b.title}</h3>
            <span class="book-card-author">By ${b.author}</span>
            <span class="book-card-arrow">→</span>
        </a>
    `).join('');

    initSharedLayout('book-notes');

    // Re-observe
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    grid.querySelectorAll('.anim-in').forEach(el => obs.observe(el));
    </script>
</body>
</html>
