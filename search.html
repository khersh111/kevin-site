<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search — Kevin Hershberger</title>
    <meta name="description" content="Search articles by Dr. Kevin Hershberger.">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <section class="search-page">
        <div class="search-inner">
            <h1 class="search-title anim-in">Search</h1>
            <div class="search-box anim-in">
                <input type="text" id="search-input" class="search-input" placeholder="Search articles..." autofocus>
                <span class="search-icon">⌕</span>
            </div>
            <div class="search-results" id="search-results">
                <p class="search-hint">Start typing to search across all articles.</p>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="shared.js"></script>
    <script>
    // Search index — all articles + books
    const searchIndex = [
        // Articles
        { type: 'article', slug: 'the-best-books-i-read-in-2025', title: 'The Best Books I Read in 2025', category: 'Books', url: 'article?slug=the-best-books-i-read-in-2025' },
        { type: 'article', slug: 'a-guide-to-tracking-your-fitness-progress', title: 'A Guide to Tracking Your Fitness Progress', category: 'Fitness', url: 'article?slug=a-guide-to-tracking-your-fitness-progress' },
        { type: 'article', slug: 'the-best-books-i-read-in-2024', title: 'The Best Books I Read in 2024', category: 'Books', url: 'article?slug=the-best-books-i-read-in-2024' },
        { type: 'article', slug: 'why-i-chose-to-do-an-orthopedic-fellowship', title: 'Why I Chose To Do An Orthopedic Fellowship', category: 'Career', url: 'article?slug=why-i-chose-to-do-an-orthopedic-fellowship' },
        { type: 'article', slug: 'lessons-i-learned-in-my-first-year-working-as-a-physical-therapist', title: 'Lessons I Learned in my First Year Working as a Physical Therapist', category: 'Career', url: 'article?slug=lessons-i-learned-in-my-first-year-working-as-a-physical-therapist' },
        { type: 'article', slug: 'why-i-became-a-physical-therapist', title: 'Why I Became a Physical Therapist', category: 'Career', url: 'article?slug=why-i-became-a-physical-therapist' },
        { type: 'article', slug: 'should-you-stretch-your-upper-traps', title: 'Should You Stretch Your Upper Traps?', category: 'Injury', url: 'article?slug=should-you-stretch-your-upper-traps' },
        { type: 'article', slug: '3-things-ive-learned-from-leonardo-da-vinci', title: "3 Things I've Learned From Leonardo da Vinci", category: 'Wellness', url: 'article?slug=3-things-ive-learned-from-leonardo-da-vinci' },
        { type: 'article', slug: 'a-needed-paradigm-shift-for-the-physical-therapy-profession', title: 'A Needed Paradigm Shift for the Physical Therapy Profession', category: 'Career', url: 'article?slug=a-needed-paradigm-shift-for-the-physical-therapy-profession' },
        { type: 'article', slug: 'on-managing-stress', title: 'On Managing Stress', category: 'Wellness', url: 'article?slug=on-managing-stress' },
        { type: 'article', slug: 'i-quit-alcohol-for-30-days', title: 'I Quit Alcohol For 30 Days', category: 'Wellness', url: 'article?slug=i-quit-alcohol-for-30-days' },
        { type: 'article', slug: 'supplements-i-take-to-boost-health-and-longevity', title: 'Supplements I Take To Boost Health & Longevity', category: 'Fitness', url: 'article?slug=supplements-i-take-to-boost-health-and-longevity' },
        { type: 'article', slug: 'show-your-work', title: 'Show Your Work', category: 'Wellness', url: 'article?slug=show-your-work' },
        { type: 'article', slug: 'whats-in-my-bag', title: "What's in my Bag", category: 'Wellness', url: 'article?slug=whats-in-my-bag' },
        { type: 'article', slug: 'the-best-books-i-read-in-2023', title: 'The Best Books I Read in 2023', category: 'Books', url: 'article?slug=the-best-books-i-read-in-2023' },
        { type: 'article', slug: 'on-journaling', title: 'On Journaling', category: 'Mindfulness', url: 'article?slug=on-journaling' },
        { type: 'article', slug: 'what-5-years-of-meditation-has-taught-me', title: 'What 5 Years of Meditation Has Taught Me', category: 'Mindfulness', url: 'article?slug=what-5-years-of-meditation-has-taught-me' },
        { type: 'article', slug: 'the-recent-rise-of-stoicism', title: 'The Recent Rise of Stoicism', category: 'Wellness', url: 'article?slug=the-recent-rise-of-stoicism' },
        { type: 'article', slug: 'maximizing-life-fulfillment', title: 'Maximizing Life Fulfillment', category: 'Wellness', url: 'article?slug=maximizing-life-fulfillment' },
        { type: 'article', slug: 'how-to-manage-your-time', title: 'How to Manage Your Time', category: 'Wellness', url: 'article?slug=how-to-manage-your-time' },
        { type: 'article', slug: 'my-fitness-routine-as-a-physical-therapist', title: 'My Fitness Routine as a Physical Therapist', category: 'Fitness', url: 'article?slug=my-fitness-routine-as-a-physical-therapist' },
        { type: 'article', slug: 'perfecting-your-sleep', title: 'Perfecting Your Sleep', category: 'Wellness', url: 'article?slug=perfecting-your-sleep' },
        { type: 'article', slug: 'how-reading-changed-my-life', title: 'How Reading Changed My Life And How It Can Change Yours', category: 'Books', url: 'article?slug=how-reading-changed-my-life' },
    ];

    const input = document.getElementById('search-input');
    const results = document.getElementById('search-results');

    // Auto-populate from URL string
    const urlParams = new URLSearchParams(window.location.search);
    const qParam = urlParams.get('q');
    if (qParam) {
        input.value = qParam;
        setTimeout(doSearch, 50); // slight delay to ensure DOM is ready
    }

    let debounceTimer;
    input.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(doSearch, 200);
    });

    function doSearch() {
        const q = input.value.trim().toLowerCase();
        if (q.length < 2) {
            results.innerHTML = '<p class="search-hint">Start typing to search across all articles.</p>';
            return;
        }

        const matches = searchIndex.filter(item => 
            item.title.toLowerCase().includes(q) || 
            item.category.toLowerCase().includes(q) ||
            item.slug.includes(q)
        );

        if (matches.length === 0) {
            results.innerHTML = `<p class="search-empty">No results for "<strong>${q}</strong>"</p>`;
            return;
        }

        results.innerHTML = matches.map(item => `
            <a href="${item.url}" class="search-result">
                <span class="search-result-type">Article</span>
                <h3 class="search-result-title">${highlight(item.title, q)}</h3>
                <span class="search-result-cat">${item.category}</span>
            </a>
        `).join('');
    }

    function highlight(text, query) {
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<mark>$1</mark>');
    }

    initSharedLayout('');
    </script>
</body>
</html>
