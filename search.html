    const input = document.getElementById('search-input');
    const results = document.getElementById('search-results');

    // Auto-populate from URL string
    const urlParams = new URLSearchParams(window.location.search);
    const qParam = urlParams.get('q');
    if (qParam) {
        input.value = qParam;
        setTimeout(doSearch, 50); // slight delay to ensure DOM is ready
    }

    let debounceTimer;
    input.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(doSearch, 200);
    });

    function doSearch() {
        const q = input.value.trim().toLowerCase();
        if (q.length < 2) {
            results.innerHTML = '<p class="search-hint">Start typing to search across all articles and book notes.</p>';
            return;
        }

        const matches = searchIndex.filter(item => 
            item.title.toLowerCase().includes(q) || 
            item.category.toLowerCase().includes(q) ||
            item.slug.includes(q)
        );

        if (matches.length === 0) {
            results.innerHTML = `<p class="search-empty">No results for "<strong>${q}</strong>"</p>`;
            return;
        }

        results.innerHTML = matches.map(item => `
            <a href="${item.url}" class="search-result">
                <span class="search-result-type">${item.type === 'article' ? 'Article' : 'Book Note'}</span>
                <h3 class="search-result-title">${highlight(item.title, q)}</h3>
                <span class="search-result-cat">${item.category}</span>
            </a>
        `).join('');
    }

    function highlight(text, query) {
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<mark>$1</mark>');
    }

    initSharedLayout('');
