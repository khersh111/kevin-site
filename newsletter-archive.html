<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Archive — Kevin Hershberger</title>
    <meta name="description" content="Browse the full archive of Kevin Hershberger's weekly newsletter on injury prevention, fitness, and living better.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <section class="page-hero">
        <div class="page-hero-inner">
            <span class="page-hero-label anim-in">05 — Newsletter</span>
            <h1 class="page-hero-title anim-in">Archive</h1>
            <p class="page-hero-desc anim-in">Every issue of the weekly newsletter, in one place.</p>
        </div>
    </section>

    <section class="listing-page">
        <div class="listing-filters anim-in" id="year-filters">
            <button class="filter-btn active" data-year="all">All</button>
        </div>

        <div class="archive-search-wrap anim-in">
            <input type="text" id="archive-search" class="archive-search" placeholder="Search newsletters…">
        </div>

        <div class="article-list" id="archive-list">
            <div class="article-loading">Loading newsletters…</div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="shared.js"></script>
    <script>
    let allNewsletters = [];
    let currentYear = 'all';
    let currentSearch = '';

    function parseYear(dateStr) {
        const m = dateStr.match(/\d{4}/);
        return m ? m[0] : '';
    }

    function render() {
        let items = allNewsletters;

        if (currentYear !== 'all') {
            items = items.filter(n => parseYear(n.date) === currentYear);
        }

        if (currentSearch.trim()) {
            const q = currentSearch.toLowerCase();
            items = items.filter(n =>
                n.title.toLowerCase().includes(q) ||
                n.date.toLowerCase().includes(q)
            );
        }

        const list = document.getElementById('archive-list');
        if (!items.length) {
            list.innerHTML = '<p style="color:var(--color-muted);padding:2rem 0">No newsletters found.</p>';
            return;
        }

        list.innerHTML = items.map((n, i) => `
            <a href="newsletter-detail.html?slug=${encodeURIComponent(n.slug)}" class="writing-item anim-in" style="animation-delay:${i * 0.02}s">
                <span class="writing-item-cat">${n.date}</span>
                <h3 class="writing-item-title">${n.title}</h3>
                <span class="writing-item-arrow">→</span>
            </a>
        `).join('');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.05 });
        list.querySelectorAll('.anim-in').forEach(el => observer.observe(el));
    }

    function buildYearFilters(newsletters) {
        const years = [...new Set(newsletters.map(n => parseYear(n.date)).filter(Boolean))].sort((a,b) => b-a);
        const container = document.getElementById('year-filters');
        years.forEach(y => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.year = y;
            btn.textContent = y;
            container.appendChild(btn);
        });

        container.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                container.querySelector('.active').classList.remove('active');
                btn.classList.add('active');
                currentYear = btn.dataset.year;
                render();
            });
        });
    }

    document.getElementById('archive-search').addEventListener('input', e => {
        currentSearch = e.target.value;
        render();
    });

    fetch('newsletters.json')
        .then(r => r.json())
        .then(data => {
            // Sort newest first
            allNewsletters = data.sort((a, b) => {
                return new Date(b.date) - new Date(a.date);
            });
            buildYearFilters(allNewsletters);
            render();
        })
        .catch(() => {
            document.getElementById('archive-list').innerHTML =
                '<p style="color:var(--color-muted)">Could not load newsletters.</p>';
        });

    initSharedLayout('newsletter');
    </script>

    <style>
    .archive-search-wrap {
        max-width: 900px;
        margin: 0 auto 2rem;
        padding: 0 var(--page-pad, 5%);
    }
    .archive-search {
        width: 100%;
        padding: 0.75rem 1.25rem;
        border: 1.5px solid var(--color-border, #e5e7eb);
        border-radius: 9999px;
        font-family: inherit;
        font-size: 0.95rem;
        background: var(--color-bg, #fff);
        color: inherit;
        outline: none;
        transition: border-color 0.2s;
    }
    .archive-search:focus {
        border-color: var(--color-accent, #6366f1);
    }
    </style>
</body>
</html>
